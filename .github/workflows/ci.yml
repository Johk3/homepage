name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Lint commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      - name: Lint markdown
        run: npx markdownlint 'content/**/*.md'

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Check HTML output
        uses: anishathalye/proof-html@v2
        with:
          directory: ./public
          enforce_https: false
          check_external_hash: false
          ignore_urls: |
            https://github.com/samsepiol
            https://linkedin.com/in/samsepiol
            https://twitter.com/samsepiol
            https://weather.samsepiol.dev
